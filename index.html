<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessily</title>
</head>

<body>
    <header role="banner">
        <nav role="navigation" aria-label="Main Navigation">
            <div class="logo">
                <h1>Accessily</h1>
            </div>

            <ul class="nav-links">
                <li><a href="#">Contact</a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Accessibility</a></li>
            </ul>


        </nav>
    </header>

    <main>
        <section class="hero-sect">
            <div class="hero-container">
                <div class="hero-left">
                    <h1>Beautiful design that everyone can access</h1>
                    <p id="hero-description"> Accessily helps businesses create inclusive websites that work for everyone,
                        including users who rely on assistive technologies.</p>
                    <form class="hero-form" aria-describedby="hero-desc">
                        <label for="email" class="label-hidden">Email</label>
                        <input type="email" name="email" placeholder="Enter your email" autocomplete="email">

                        <button class="btn" id="hero-btn">Get Started</button>
                    </form>
                </div>

                <div class="hero-right">
                    <div class="image-placeholder">Image PlaceHolder</div>
                </div>
            </div>
        </section>

        <section class="about-sect"></section>

        <section class="services-sect"></section>

        <section class="contact-sect"></section>

    </main>

    <footer></footer>
</body>

</html>
